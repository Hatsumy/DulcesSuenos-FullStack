spring.application.name=ventas-almacen

# 1. Configuración de la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/sistemaventasalmacen?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
